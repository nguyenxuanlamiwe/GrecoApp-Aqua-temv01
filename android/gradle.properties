org.gradle.jvmargs=-Xmx4096M
android.useAndroidX=true
android.enableJetifier=true
android.defaults.buildfeatures.buildconfig=true
android.nonTransitiveRClass=false
android.nonFinalResIds=false

# Support for 16KB page sizes (required for Android 15+)
# android.bundle.enableUncompressedNativeLibs=false
android.enableR8.fullMode=true
android.bundle.enable16KbPageSupport=true

# Disable Kotlin incremental compilation to fix cross-drive issues
kotlin.incremental=false
kotlin.incremental.usePreciseJavaTracking=false
